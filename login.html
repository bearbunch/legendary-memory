<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - My Chat</title>

<link rel="stylesheet" href="src/style.css">

<link id="favicon" rel="icon" href="src/icons/light.ico">

</head>


<body>


<header class="navbar">


<div class="logo">
<span>My</span> Chat
</div>



<select id="themeSelect">

<option value="system">
System
</option>

<option value="light">
Light
</option>

<option value="dark">
Dark
</option>

</select>


</header>





<main class="account-page">


<div class="account-box">


<h1>
Welcome Back
</h1>


<p>
Login to your My Chat account.
</p>




<form>


<input
type="email"
placeholder="Email"
required>



<input
type="password"
placeholder="Password"
required>




<button class="btn primary">

Login

</button>


</form>





<p class="switch">

Don't have an account?

<a href="register.html">
Create one
</a>


</p>



</div>


</main>




<script src="src/theme.js"></script>


</body>

</html>
